<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cochran Films - Ops Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <style>
        /* CSS Variables - Dark Theme Default */
        :root {
            --primary: #00D4FF;
            --primary-glow: #00D4FF40;
            --secondary: #FF6B9D;
            --secondary-glow: #FF6B9D40;
            --accent: #FFD93D;
            --success: #4ADE80;
            --warning: #FBBF24;
            --error: #F87171;
            
            /* Dark Theme Colors - Now Default */
            --bg-primary: #0A0A0A;
            --bg-secondary: #111111;
            --bg-tertiary: #1A1A1A;
            --bg-card: #1E1E1E;
            --bg-glass: rgba(30, 30, 30, 0.9);
            
            --text-primary: #FFFFFF;
            --text-secondary: #E5E7EB;
            --text-muted: #9CA3AF;
            --text-accent: #00D4FF;
            
            --border-color: #2A2A2A;
            --border-glow: #00D4FF20;
            
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.5);
            --shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
            --shadow-md: 0 8px 16px rgba(0, 0, 0, 0.7);
            --shadow-lg: 0 16px 32px rgba(0, 0, 0, 0.8);
            --shadow-xl: 0 32px 64px rgba(0, 0, 0, 0.9);
            --shadow-glow: 0 0 20px rgba(0, 212, 255, 0.4);
            
            --radius-sm: 0.5rem;
            --radius: 0.75rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --radius-xl: 2rem;
            --radius-2xl: 3rem;
            
            --spacing-1: 0.25rem;
            --spacing-2: 0.5rem;
            --spacing-3: 0.75rem;
            --spacing-4: 1rem;
            --spacing-5: 1.25rem;
            --spacing-6: 1.5rem;
            --spacing-8: 2rem;
            --spacing-10: 2.5rem;
            --spacing-12: 3rem;
            --spacing-16: 4rem;
            --spacing-20: 5rem;
        }

        /* Light Mode Variables - Now Optional */
        [data-theme="light"] {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F9FAFB;
            --bg-tertiary: #F3F4F6;
            --bg-card: #FFFFFF;
            --bg-glass: rgba(255, 255, 255, 0.9);
            
            --text-primary: #111827;
            --text-secondary: #374151;
            --text-muted: #6B7280;
            --text-accent: #0066CC;
            
            --border-color: #E5E7EB;
            --border-glow: #0066CC20;
        }

        /* Base Styles with Dark Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 157, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 217, 61, 0.05) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundShift 20s ease-in-out infinite;
        }

        @keyframes backgroundShift {
            0%, 100% { transform: scale(1) rotate(0deg); }
            33% { transform: scale(1.1) rotate(1deg); }
            66% { transform: scale(1.05) rotate(-1deg); }
        }

        /* Layout with Glassmorphism */
        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            min-height: 100vh;
            gap: 0;
            position: relative;
        }

        .sidebar {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            padding: var(--spacing-6);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .main-content {
            padding: var(--spacing-6);
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .right-rail {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color);
            padding: var(--spacing-6);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        /* Navbar with Glassmorphism */
        .navbar {
            position: sticky;
            top: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: var(--spacing-4) var(--spacing-6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: var(--shadow-lg);
            margin-bottom: var(--spacing-6);
        }

        .navbar-brand {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .navbar-controls {
            display: flex;
            gap: var(--spacing-4);
            align-items: center;
        }

        .search-container {
            position: relative;
        }

        /* Enhanced Buttons with 3D Effects */
        .btn {
            padding: var(--spacing-3) var(--spacing-5);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-2);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-height: 44px;
            box-shadow: var(--shadow-sm);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #0099CC);
            color: var(--text-primary);
            box-shadow: var(--shadow-glow);
            transform: translateY(0);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow), 0 8px 25px rgba(0, 212, 255, 0.4);
            border-color: rgba(0, 212, 255, 0.6);
        }

        .btn-secondary {
            background: var(--bg-glass);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn-sm {
            padding: var(--spacing-2) var(--spacing-3);
            font-size: 0.75rem;
            min-height: 36px;
            border-radius: var(--radius);
            font-weight: 500;
            white-space: nowrap;
            max-width: 120px;
        }

        /* Section Cards */
        .section {
            margin-bottom: var(--spacing-12);
            scroll-margin-top: 100px;
        }

        /* Enhanced Cards with Glassmorphism */
        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-2xl);
            padding: var(--spacing-8);
            margin-bottom: var(--spacing-6);
            box-shadow: var(--shadow-lg);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border-left: 4px solid transparent;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-xl), var(--shadow-glow);
            border-color: var(--primary);
            border-left-color: var(--primary);
        }

        /* Section Headers with Animation */
        .section-header {
            margin-bottom: var(--spacing-8);
            padding-bottom: var(--spacing-6);
            border-bottom: 2px solid transparent;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .section-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation: headerGlow 2s ease-in-out infinite alternate;
        }

        @keyframes headerGlow {
            0% { box-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
            100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.8); }
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: var(--spacing-3);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-description {
            color: var(--text-secondary);
            font-size: 1.25rem;
            font-weight: 400;
        }

        /* Quick Tiles with 3D Hover Effects */
        .quick-tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-6);
            margin-bottom: var(--spacing-8);
        }

        .quick-tile {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--spacing-8);
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .quick-tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .quick-tile:hover::before {
            opacity: 1;
        }

        .quick-tile:hover {
            transform: translateY(-8px) rotateX(5deg);
            box-shadow: var(--shadow-xl), 0 20px 40px rgba(0, 212, 255, 0.2);
            border-color: var(--primary);
        }

        .quick-tile-icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-4);
            color: var(--primary);
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
            transition: all 0.3s ease;
        }

        .quick-tile:hover .quick-tile-icon {
            transform: scale(1.1) rotate(5deg);
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.8));
        }

        .quick-tile-title {
            font-weight: 700;
            margin-bottom: var(--spacing-3);
            font-size: 1.25rem;
            color: var(--text-primary);
        }

        .quick-tile-description {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* New Component Styles */
        .skills-grid, .projects-grid, .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-6);
        }

        .skill-card, .project-card, .client-card {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-6);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .skill-card::before, .project-card::before, .client-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .skill-card:hover::before, .project-card:hover::before, .client-card:hover::before {
            transform: scaleY(1);
        }

        .skill-card:hover, .project-card:hover, .client-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            border-color: var(--primary);
        }

        .skill-header, .project-header, .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-4);
        }

        .skill-level, .project-status, .client-status {
            padding: var(--spacing-1) var(--spacing-3);
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .skill-level-expert { background: var(--success); color: var(--text-primary); }
        .skill-level-advanced { background: var(--primary); color: var(--text-primary); }
        .skill-level-intermediate { background: var(--warning); color: var(--text-primary); }

        .project-status-development { background: var(--primary); color: var(--text-primary); }
        .project-status-testing { background: var(--warning); color: var(--text-primary); }
        .project-status-design { background: var(--secondary); color: var(--text-primary); }
        .project-status-upcoming { background: var(--accent); color: var(--text-primary); }
        .project-status-completed { background: var(--success); color: var(--text-primary); }

        .client-status-active { background: var(--success); color: var(--text-primary); }
        .client-status-past { background: var(--text-muted); color: var(--text-primary); }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: var(--spacing-3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: var(--radius);
            transition: width 1s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: progressShine 2s ease-in-out infinite;
        }

        @keyframes progressShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .certifications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-4);
        }

        .certification-card {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            transition: all 0.3s ease;
        }

        .cert-status-active { background: var(--success); color: var(--text-primary); }
        .cert-status-in-progress { background: var(--warning); color: var(--text-primary); }

        /* Sidebar Navigation */
        .sidebar-nav {
            margin-top: var(--spacing-8);
        }

        .nav-section {
            margin-bottom: var(--spacing-6);
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: var(--spacing-3);
            letter-spacing: 0.05em;
        }

        .nav-links {
            list-style: none;
        }

        /* Enhanced Navigation */
        .nav-link {
            display: block;
            padding: var(--spacing-3) var(--spacing-4);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius);
            margin-bottom: var(--spacing-2);
            transition: all 0.3s ease;
            font-size: 0.875rem;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary-glow), transparent);
            transition: left 0.5s;
        }

        .nav-link:hover::before {
            left: 100%;
        }

        .nav-link:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--text-primary);
            font-weight: 600;
            box-shadow: var(--shadow-glow);
        }

        /* Dropdown Styles */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            min-width: 220px;
            z-index: 1000;
            margin-top: var(--spacing-2);
            animation: dropdownSlide 0.3s ease-out;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            display: block;
            padding: var(--spacing-3) var(--spacing-4);
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary-glow);
            transition: left 0.3s ease;
        }

        .dropdown-item:hover::before {
            left: 0;
        }

        .dropdown-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .app-container {
                grid-template-columns: 320px 1fr;
            }
            .right-rail {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: fixed;
                left: 0;
                z-index: 1000;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .navbar-controls {
                gap: var(--spacing-2);
            }
            .search-input {
                width: 200px;
            }
            .quick-tiles {
                grid-template-columns: 1fr;
            }
            .skills-grid, .projects-grid, .clients-grid {
                grid-template-columns: 1fr;
            }
            .documents-grid {
                grid-template-columns: 1fr;
            }
            .link-item, .document-item {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-3);
            }
            .link-actions, .document-actions {
                width: 100%;
                justify-content: flex-end;
            }
            .btn-sm {
                max-width: none;
                flex: 1;
            }
        }

        /* Animation Classes */
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        .slide-up {
            animation: slideUp 0.6s ease-out;
        }

        .scale-in {
            animation: scaleIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Enhanced Search Input */
        .search-input {
            padding: var(--spacing-3) var(--spacing-4);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--bg-glass);
            color: var(--text-primary);
            width: 350px;
            font-size: 0.875rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            transform: scale(1.02);
        }

        /* Enhanced Dropdown */
        .dropdown-menu {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            min-width: 220px;
            z-index: 1000;
            margin-top: var(--spacing-2);
            animation: dropdownSlide 0.3s ease-out;
        }

        @keyframes dropdownSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-item {
            padding: var(--spacing-3) var(--spacing-4);
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .dropdown-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary-glow);
            transition: left 0.3s ease;
        }

        .dropdown-item:hover::before {
            left: 0;
        }

        .dropdown-item:hover {
            color: var(--text-primary);
            transform: translateX(4px);
        }

        /* Utility Classes */
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .text-right { text-align: right; }
        
        .mb-1 { margin-bottom: var(--spacing-1); }
        .mb-2 { margin-bottom: var(--spacing-2); }
        .mb-3 { margin-bottom: var(--spacing-3); }
        .mb-4 { margin-bottom: var(--spacing-4); }
        .mb-6 { margin-bottom: var(--spacing-6); }
        .mb-8 { margin-bottom: var(--spacing-8); }
        
        .mt-1 { margin-top: var(--spacing-1); }
        .mt-2 { margin-top: var(--spacing-2); }
        .mt-4 { margin-top: var(--spacing-4); }
        .mt-6 { margin-top: var(--spacing-6); }
        
        .p-2 { padding: var(--spacing-2); }
        .p-4 { padding: var(--spacing-4); }
        .p-6 { padding: var(--spacing-6); }
        
        .rounded { border-radius: var(--radius); }
        .rounded-lg { border-radius: var(--radius-lg); }
        .rounded-xl { border-radius: var(--radius-xl); }
        .rounded-2xl { border-radius: var(--radius-2xl); }

        /* Additional Component Styles */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            min-width: 220px;
            z-index: 1000;
            margin-top: var(--spacing-2);
            animation: dropdownSlide 0.3s ease-out;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            display: block;
            padding: var(--spacing-3) var(--spacing-4);
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: var(--bg-tertiary);
        }

        /* Right Rail Styles */
        .rail-section {
            margin-bottom: var(--spacing-8);
        }

        .rail-section h3 {
            margin-bottom: var(--spacing-4);
            color: var(--text-primary);
            font-size: 1.125rem;
        }

        .notes-textarea {
            width: 100%;
            min-height: 120px;
            padding: var(--spacing-3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--bg-secondary);
            color: var(--text-primary);
            resize: vertical;
            font-family: inherit;
        }

        .notes-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Toast Styles */
        .toast {
            position: fixed;
            bottom: var(--spacing-6);
            right: var(--spacing-6);
            background: var(--primary);
            color: var(--black);
            padding: var(--spacing-3) var(--spacing-4);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            z-index: 10000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Link Item Styles */
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-4);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-3);
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            min-height: 80px;
            gap: var(--spacing-3);
        }

        .link-item:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .link-item.pinned {
            border-color: var(--primary);
            background: var(--primary);
            color: var(--black);
        }

        .link-info {
            flex: 1;
            min-width: 0;
            overflow: visible;
        }

        .link-title {
            font-weight: 600;
            margin-bottom: var(--spacing-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            cursor: help;
        }

        .link-url {
            font-size: 0.875rem;
            color: var(--text-muted);
            word-break: break-all;
        }

        .link-actions {
            display: flex;
            gap: var(--spacing-2);
            flex-shrink: 0;
            align-items: center;
            min-width: 0;
        }

        .btn-icon {
            padding: var(--spacing-1);
            background: none;
            border: none;
            cursor: pointer;
            border-radius: var(--radius);
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: var(--bg-tertiary);
        }

        .btn-icon.pin {
            color: var(--primary);
        }

        .btn-icon.copy {
            color: var(--accent);
        }

        /* Color Swatches */
        .color-swatches {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-6);
        }

        .color-swatch {
            text-align: center;
            padding: var(--spacing-4);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
        }

        .color-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto var(--spacing-3);
            border: 3px solid var(--text-primary);
            box-shadow: var(--shadow-md);
        }

        .color-hex {
            font-family: monospace;
            font-weight: 600;
            margin-bottom: var(--spacing-2);
        }

        .color-name {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Portfolio Cards */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-4);
        }

        .portfolio-card {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .portfolio-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }

        .portfolio-thumbnail {
            width: 100%;
            height: 150px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .portfolio-content {
            padding: var(--spacing-4);
        }

        .portfolio-title {
            font-weight: 600;
            margin-bottom: var(--spacing-2);
        }

        .portfolio-tags {
            display: flex;
            gap: var(--spacing-2);
            margin-bottom: var(--spacing-3);
        }

        .tag {
            background: var(--primary);
            color: var(--text-primary);
            padding: var(--spacing-1) var(--spacing-2);
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Social Posts */
        .social-posts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-4);
        }

        .social-post {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            position: relative;
        }

        .post-platform {
            position: absolute;
            top: var(--spacing-3);
            right: var(--spacing-3);
            background: var(--primary);
            color: var(--text-primary);
            padding: var(--spacing-1) var(--spacing-2);
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .post-content {
            margin-bottom: var(--spacing-3);
            line-height: 1.5;
        }

        .post-tags {
            margin-bottom: var(--spacing-3);
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .post-actions {
            display: flex;
            gap: var(--spacing-2);
        }

        /* Edit Mode Styles */
        .edit-mode .editable {
            border: 1px dashed var(--primary);
            padding: var(--spacing-2);
            border-radius: var(--radius);
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
        }

        .edit-mode .editable:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-tertiary);
        }

        /* Search Highlight */
        .search-highlight {
            background: var(--primary);
            color: var(--text-primary);
            padding: 0 var(--spacing-1);
            border-radius: var(--radius-sm);
        }

        /* Additional Component Styles */
        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-4);
        }

        .logo-item {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            text-align: center;
        }

        .logo-preview {
            margin-bottom: var(--spacing-3);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-placeholder {
            color: var(--text-muted);
            font-size: 0.875rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100px;
            text-align: center;
            background: var(--bg-tertiary);
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
        }

        .placeholder-icon {
            font-size: 2rem;
            margin-bottom: var(--spacing-2);
            opacity: 0.6;
        }

        .placeholder-text {
            font-size: 0.75rem;
            line-height: 1.2;
        }

        .placeholder-graphic {
            position: relative;
            width: 100%;
            height: 120px;
        }

        .placeholder-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.1);
            color: var(--text-muted);
            text-align: center;
        }

        .placeholder-overlay .placeholder-icon {
            font-size: 1.5rem;
            margin-bottom: var(--spacing-2);
            opacity: 0.8;
        }

        .placeholder-overlay .placeholder-text {
            font-size: 0.75rem;
            line-height: 1.2;
        }

        .document-placeholder {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-style: italic;
            margin-top: var(--spacing-1);
        }

        .task-header,
        .contract-header,
        .email-header,
        .case-study-header,
        .form-header,
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-3);
        }

        .task-header h4,
        .contract-header h4,
        .email-header h4,
        .case-study-header h3,
        .form-header h3,
        .note-header h4 {
            margin: 0;
        }

        .pricing-actions,
        .service-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
            margin-top: var(--spacing-2);
        }

        .logo-info {
            text-align: center;
        }

        .logo-name {
            font-weight: 600;
            margin-bottom: var(--spacing-1);
        }

        .logo-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-2);
        }

        .logo-actions {
            display: flex;
            gap: var(--spacing-2);
            justify-content: center;
        }

        .typography-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-4);
        }

        .font-item h4 {
            margin-bottom: var(--spacing-2);
            color: var(--text-primary);
        }

        .font-item p {
            padding: var(--spacing-2);
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
        }

        .voice-points {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-3);
        }

        .voice-point {
            padding: var(--spacing-3);
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border-radius: var(--radius);
            border-left: 3px solid var(--primary);
        }

        .pricing-grid, .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-4);
        }

        .pricing-tier, .service-item {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            text-align: center;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin: var(--spacing-2) 0;
        }

        .duration {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-2);
        }

        .features {
            margin: var(--spacing-3) 0;
            padding: var(--spacing-3);
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            border-left: 3px solid var(--primary);
        }

        .feature {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-1);
            line-height: 1.4;
        }

        .billing-note {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            margin-top: var(--spacing-2);
            padding: var(--spacing-2);
            background: var(--bg-tertiary);
            border-radius: var(--radius);

        .addon-categories {
            display: grid;
            gap: var(--spacing-6);

        .addon-category h4 {
            color: var(--text-primary);
            margin-bottom: var(--spacing-4);

        }

        .addon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-4);
        }

        .addon-item {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            transition: all 0.3s ease;
        }

        .addon-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .addon-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-3);
        }

        .addon-header h5 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.125rem;
        }

        .addon-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .addon-description {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-3);
            font-size: 0.875rem;
        }

        .addon-features {
            margin: var(--spacing-3) 0;
            padding: var(--spacing-3);
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            border-left: 3px solid var(--accent);
        }

        .addon-feature {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-1);
            line-height: 1.4;
        }

        .addon-actions {

            gap: var(--spacing-2);
            margin-top: var(--spacing-3);
        }

        .debug-info {

            padding: 0;
            margin: var(--spacing-3) 0 0 0;

        .debug-info li {
            padding: var(--spacing-2);
            margin-bottom: var(--spacing-1);
            background: var(--bg-glass);
            border-radius: var(--radius);
            border-left: 3px solid var(--accent);
        }

        .description {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-3);
        }

        .template-item {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            margin-bottom: var(--spacing-4);
        }

        .template-content {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: var(--spacing-3);
            margin: var(--spacing-3) 0;
            overflow-x: auto;
        }

        .template-content pre {
            margin: 0;
            white-space: pre-wrap;

            line-height: 1.5;
        }

        .template-tags {

        }

        .template-actions {
            display: flex;
            gap: var(--spacing-2);
        }

        .filter-controls {
            display: flex;
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-4);
        }

        .filter-select {
            padding: var(--spacing-2) var(--spacing-3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .seo-checklist {
            display: grid;
            gap: var(--spacing-3);
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: var(--spacing-3);
            padding: var(--spacing-3);
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
            cursor: pointer;
            flex: 1;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .task-notes {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .contract-item, .email-template {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            margin-bottom: var(--spacing-4);
        }

        .contract-notes, .email-content {
            margin: var(--spacing-3) 0;
            color: var(--text-secondary);
        }

            border-radius: var(--radius);
            padding: var(--spacing-3);
            overflow-x: auto;
            white-space: pre-wrap;
            font-family: inherit;
            line-height: 1.5;
        }

            line-height: 1.6;
        }

            margin: var(--spacing-3) 0 var(--spacing-2);
            color: var(--text-primary);
        }

        .case-study-content ul {
            margin: var(--spacing-2) 0;
            padding-left: var(--spacing-4);
        }

        .case-study-content li {
            margin-bottom: var(--spacing-1);
        }

        .forms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-4);
        }

        .form-description {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-3);
        }

        .form-actions {
            display: flex;
            gap: var(--spacing-2);
        }

        .notes-sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-4);
        }

        .note-section h4 {
            margin-bottom: var(--spacing-2);
            color: var(--text-primary);
        }

        .note-textarea {
            width: 100%;
            min-height: 100px;
            padding: var(--spacing-3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            resize: vertical;
            font-family: inherit;
        }

        .clipboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-2);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            margin-bottom: var(--spacing-2);
            background: var(--bg-glass);
            backdrop-filter: blur(15px);

        .clipboard-text {

            color: var(--text-secondary);

        }

        .font-bold {
            font-weight: 700;
        }

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-4);
        }

        .graphic-item {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .graphic-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .graphic-preview {
            width: 100%;
            height: 120px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .graphic-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .graphic-info {
            padding: var(--spacing-3);
        }

        .graphic-name {

            margin-bottom: var(--spacing-1);

        .graphic-dimensions {

            color: var(--text-muted);
            margin-bottom: var(--spacing-2);

        .graphic-actions {
            display: flex;
            gap: var(--spacing-2);
        }

        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: var(--spacing-4);
        }

        .document-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-3);
            padding: var(--spacing-4);
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            transition: all 0.2s ease;
            min-height: 100px;
        }

        .document-item:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
        }

        .document-icon {
            font-size: 2rem;
            color: var(--primary);
        }

        .document-info {
            flex: 1;
            min-width: 0;
            overflow: visible;
        }

        .document-name {
            font-weight: 600;
            margin-bottom: var(--spacing-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            cursor: help;
        }

        .document-type {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-1);
            white-space: nowrap;
        }

        .document-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* Tooltip for truncated titles */
        .link-title[title], .document-name[title] {
            position: relative;
        }

        .link-title[title]:hover::after, .document-name[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: var(--spacing-2) var(--spacing-3);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            white-space: nowrap;
            z-index: 1000;
            font-size: 0.875rem;
            margin-bottom: var(--spacing-2);
        }

        .document-actions {
            display: flex;
            gap: var(--spacing-2);
            flex-shrink: 0;
            align-items: center;
            min-width: 0;
        }

        .logo-upload-section, .graphic-upload-section, .document-upload-section {
            border-top: 1px solid var(--border-color);
            padding-top: var(--spacing-4);
        }

        .upload-controls {
            display: flex;
            align-items: center;
            gap: var(--spacing-3);
            flex-wrap: wrap;
        }

        .upload-hint {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-style: italic;
        }

        function handleKeyboardShortcuts(e) {
            // / to focus search
            if (e.key === '/' && !e.target.matches('input, textarea')) {
                e.preventDefault();
                document.getElementById('globalSearch').focus();
            }
            
            // s to toggle sidebar
            if (e.key === 's' && !e.target.matches('input, textarea')) {
                e.preventDefault();
                toggleSidebar();
            }
            
            // d to toggle dark mode
            if (e.key === 'd' && !e.target.matches('input, textarea')) {
                e.preventDefault();
                toggleDarkMode();
            }
            
            // g + letter for section navigation
            if (e.key === 'g' && !e.target.matches('input, textarea')) {
                e.preventDefault();
                // Wait for next key
                document.addEventListener('keydown', function sectionNav(e) {
                    const key = e.key.toLowerCase();
                    const sections = {
                        'b': 'brand',
                        'g': 'graphics',
                        'l': 'links',
                        's': 'systems',
                        'p': 'portfolio',
                        'r': 'pricing',
                        't': 'templates',
                        'o': 'social',
                        'e': 'seo',
                        'a': 'legal',
                        'c': 'case-studies',
                        'f': 'forms',
                        'n': 'notes'
                    };
                    
                    if (sections[key]) {
                        document.getElementById(sections[key]).scrollIntoView({ behavior: 'smooth' });
                    }
                    
                    document.removeEventListener('keydown', sectionNav);
                }, { once: true });
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied to clipboard!');
                addToClipboardHistory(text);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                showToast('Failed to copy to clipboard');
            });
        }

        function copyPinnedItem(id) {
            // Find the pinned item
            const pinnedItem = app.pinnedItems.find(item => item.id === id);
            if (!pinnedItem) return;
            
            let textToCopy = '';
            
            // Handle different types of pinned items
            if (id.includes('graphic-')) {
                // Extract category and index from ID (e.g., 'social-graphic-0')
                const parts = id.split('-');
                const category = parts[0];
                const index = parseInt(parts[2]);
                
                if (app.data.graphics[category] && app.data.graphics[category][index]) {
                    const graphic = app.data.graphics[category][index];
                    textToCopy = `${graphic.name} - ${graphic.dimensions} (${category} graphic)`;
                } else {
                    textToCopy = pinnedItem.title;
                }
            } else if (id.includes('logo-')) {
                // Extract index from ID (e.g., 'logo-0')
                const index = parseInt(id.split('-')[1]);
                
                if (app.data.brand.logos[index]) {
                    const logo = app.data.brand.logos[index];
                    textToCopy = `${logo.name} (${logo.type.toUpperCase()})`;
                } else {
                    textToCopy = pinnedItem.title;
                }
            } else if (id.includes('document-')) {
                // Extract index from ID (e.g., 'document-0')
                const index = parseInt(id.split('-')[1]);
                
                if (app.data.documents[index]) {
                    const doc = app.data.documents[index];
                    textToCopy = `${doc.name} (${doc.type}) - ${doc.date}`;
                } else {
                    textToCopy = pinnedItem.title;
                }
            } else {
                // For regular links and other items, copy the URL
                textToCopy = pinnedItem.url;
            }
            
            copyToClipboard(textToCopy);
        }

        function addToClipboardHistory(text) {
            app.clipboard.unshift(text);
            if (app.clipboard.length > 10) {
                app.clipboard.pop();
            }
            updateClipboardHistory();
            saveClipboard();
        }

        function updateClipboardHistory() {
            const container = document.getElementById('clipboardHistory');
            if (container) {
                if (app.clipboard.length === 0) {
                    container.innerHTML = '<p class="text-muted">No items copied yet</p>';
                } else {
                    container.innerHTML = app.clipboard.map(text => `
                        <div class="clipboard-item">
                            <div class="clipboard-text">${text.substring(0, 50)}${text.length > 50 ? '...' : ''}</div>
                            <button class="btn btn-sm btn-secondary" onclick="copyToClipboard('${text}')">Copy</button>
                        </div>
                    `).join('');
                }
            }
        }

        function togglePin(id, title, url) {
            const existingIndex = app.pinnedItems.findIndex(item => item.id === id);
            
            if (existingIndex >= 0) {
                app.pinnedItems.splice(existingIndex, 1);
            } else {
                // Handle different types of items to avoid storing long base64 strings
                let displayUrl = url;
                
                // If this is a graphic with base64 data, store just the name and type
                if (id.includes('graphic-') || id.includes('logo-')) {
                    if (url && url.startsWith('data:image/')) {
                        displayUrl = `Graphic: ${title}`;
                    } else if (url && url.startsWith('data:image/')) {
                        displayUrl = `Logo: ${title}`;
                    }
                }
                
                // If this is a document with base64 data, store just the name and type
                if (url && url.startsWith('data:')) {
                    if (id.includes('document-')) {
                        displayUrl = `Document: ${title}`;
                    } else if (id.includes('logo-')) {
                        displayUrl = `Logo: ${title}`;
                    } else if (id.includes('graphic-')) {
                        displayUrl = `Graphic: ${title}`;
                    }
                }
                
                // Additional safety check for extremely long URLs
                if (url && url.length > 200) {
                    if (id.includes('graphic-')) {
                        displayUrl = `Graphic: ${title}`;
                    } else if (id.includes('logo-')) {
                        displayUrl = `Logo: ${title}`;
                    } else if (id.includes('document-')) {
                        displayUrl = `Document: ${title}`;
                    } else {
                        displayUrl = `Item: ${title}`;
                    }
                }
                
                app.pinnedItems.push({ id, title, url: displayUrl });
            }
            
            savePinnedItems();
            renderAll();
        }

        function exportData() {
            const dataStr = JSON.stringify(app.data, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'cochran-films-ops-hub-data.json';
            link.click();
            URL.revokeObjectURL(url);
            showToast('Data exported successfully!');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = JSON.parse(e.target.result);
                            app.data = { ...app.data, ...data };
                            saveData();
                            renderAll();
                            showToast('Data imported successfully!');
                        } catch (error) {
                            showToast('Invalid JSON file');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        function replaceLogo(index) {
            const logo = app.data.brand.logos[index];
            
            // Create a file input for image replacement
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*,.pdf';
            fileInput.style.display = 'none';
            
            fileInput.onchange = function(event) {
                const file = event.target.files[0];
                if (!file) return;

                if (file.size > 10 * 1024 * 1024) { // 10MB limit
                    showToast('File too large. Maximum size is 10MB.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    // Update the existing logo
                    logo.url = e.target.result;
                    logo.type = file.name.split('.').pop().toLowerCase();
                    
                    // Optionally update the name
                    const newName = prompt('Update logo name (or keep current):', logo.name);
                    if (newName && newName.trim()) {
                        logo.name = newName.trim();
                    }
                    
                    saveData();
                    renderAll();
                    showToast('Logo replaced successfully!');
                };
                reader.readAsDataURL(file);
            };
            
            // Trigger file selection
            document.body.appendChild(fileInput);
            fileInput.click();
            document.body.removeChild(fileInput);
        }

            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.style.display = 'none';
            
            fileInput.onchange = function(event) {
                const file = event.target.files[0];
                if (!file) return;

                if (file.size > 10 * 1024 * 1024) { // 10MB limit
                    showToast('File too large. Maximum size is 10MB.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    // Update the existing graphic
                    graphic.url = e.target.result;
                    
                    // Optionally update the name and dimensions
                    const newName = prompt('Update graphic name (or keep current):', graphic.name);
                    if (newName && newName.trim()) {
                        graphic.name = newName.trim();
                    }
                    
                    const newDimensions = prompt('Update dimensions (e.g., 1200x630px):', graphic.dimensions);
                    if (newDimensions && newDimensions.trim()) {
                        graphic.dimensions = newDimensions.trim();
                    }
                    
                    saveData();
                    renderAll();
                    showToast('Graphic replaced successfully!');
                };
                reader.readAsDataURL(file);
            };
            
            // Trigger file selection
            document.body.appendChild(fileInput);
            fileInput.click();
            document.body.removeChild(fileInput);
        }

        function handleDocumentUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 50 * 1024 * 1024) { // 50MB limit
                showToast('File too large. Maximum size is 50MB.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const docName = prompt('Enter document name:', file.name.replace(/\.[^/.]+$/, ''));
                if (docName) {
                    const docType = file.name.split('.').pop().toUpperCase();
                    const today = new Date().toISOString().split('T')[0];
                    const newDoc = {
                        name: docName,
                        url: e.target.result,
                        type: docType,
                        date: today
                    };
                    app.data.documents.push(newDoc);
                    saveData();
                    renderAll();
                    showToast('Document uploaded successfully!');
                }
            };
            reader.readAsDataURL(file);
        }

        function downloadLogo(index) {
            const logo = app.data.brand.logos[index];
            if (logo.url) {
                downloadFile(logo.url, logo.name + '.' + logo.type);
            }
        }

        function downloadGraphic(category, index) {
            const graphic = app.data.graphics[category][index];
            if (graphic.url) {
                const extension = graphic.url.split(';')[0].split('/')[1];
                downloadFile(graphic.url, graphic.name + '.' + extension);
            }
        }

        function downloadDocument(index) {
            const doc = app.data.documents[index];
            if (doc.url) {
                const extension = doc.url.split(';')[0].split('/')[1];
                downloadFile(doc.url, doc.name + '.' + extension);
            }
        }

        function downloadFile(dataUrl, filename) {
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('Download started!');
        }

        function openDocument(url) {
            if (url.startsWith('data:')) {
                // For data URLs, open in new window
                const newWindow = window.open();
                newWindow.document.write(`
                    <html>
                        <head><title>Document Viewer</title></head>
                        <body style="margin:0; padding:20px;">
                            <embed src="${url}" width="100%" height="100%" style="min-height: 80vh;">
                        </body>
                    </html>
                `);
            } else {
                // For file URLs, try to open directly
                window.open(url, '_blank');
            }
        }

        function replaceDocument(index) {
            const doc = app.data.documents[index];
            
            // Create a file input for document replacement
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.pdf,.doc,.docx,.xls,.xlsx';
            fileInput.style.display = 'none';
            
            fileInput.onchange = function(event) {
                const file = event.target.files[0];
                if (!file) return;

                if (file.size > 50 * 1024 * 1024) { // 50MB limit
                    showToast('File too large. Maximum size is 50MB.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    // Update the existing document
                    doc.url = e.target.result;
                    doc.type = file.name.split('.').pop().toUpperCase();
                    
                    // Optionally update the name
                    const newName = prompt('Update document name (or keep current):', doc.name);
                    if (newName && newName.trim()) {
                        doc.name = newName.trim();
                    }
                    
                    saveData();
                    renderAll();
                    showToast('Document replaced successfully!');
                };
                reader.readAsDataURL(file);
            };
            
            // Trigger file selection
            document.body.appendChild(fileInput);
            fileInput.click();
            document.body.removeChild(fileInput);
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) {
                document.getElementById('quickActionsMenu').classList.remove('show');
            }
        });

        // Auto-save notes
        setInterval(() => {
            if (app.data.notes.general !== document.getElementById('notesArea')?.value) {
                updateNotes('general', document.getElementById('notesArea')?.value || '');
            }
        }, 5000);
    </script>
</body>
</html>
