<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>New Media Services Request — Cochran Films</title>
  <style>
    body{margin:0;background:#0b1222;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif}
    .wrap{max-width:640px;margin:0 auto;padding:20px}
    .card{background:#0f162c;border:1px solid rgba(99,102,241,.28);border-radius:14px;overflow:hidden}
    .hd{padding:20px 20px 10px;border-bottom:1px solid rgba(99,102,241,.22)}
    h1{margin:0;font-size:20px;color:#fff}
    table{width:100%;border-collapse:separate;border-spacing:0 8px}
    .k{width:40%;padding:10px 12px;background:rgba(255,178,0,.06);color:#ffd166;font-weight:800;font-size:12px;border:1px solid rgba(255,178,0,.22)}
    .v{width:60%;padding:10px 12px;border:1px solid rgba(255,178,0,.22);color:#ffffff}
    a{color:#ffffff !important}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hd"><h1>New Media Services Request</h1></div>
      <div style="padding:20px">
        <table>
          <tr><td class="k">Email</td><td class="v">{{user_email}}</td></tr>
          <tr><td class="k">Full Name</td><td class="v">{{user_name}}</td></tr>
          <tr><td class="k">Phone</td><td class="v">{{phone}}</td></tr>
          <tr><td class="k">Service Type</td><td class="v">{{service_type}}</td></tr>
          <tr><td class="k">Project Type</td><td class="v">{{project_type}}</td></tr>
          <tr><td class="k">Event Date</td><td class="v">{{event_date}}</td></tr>
          <tr><td class="k">Location</td><td class="v">{{location}}</td></tr>
          <tr><td class="k">Vision</td><td class="v">{{vision}}</td></tr>
          <tr><td class="k">Referral</td><td class="v">{{referral}}</td></tr>
          <tr><td class="k">Submitted</td><td class="v">{{submitted_at}}</td></tr>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
