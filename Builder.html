<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Service Package Request</title>
    <style>
      body { margin:0; padding:0; background:#0f172a; color:#e5e7eb; font-family: Inter, -apple-system, Segoe UI, Roboto, sans-serif; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 24px; }
      .card { background:#0f172a; border:1px solid #293042; border-radius: 16px; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
      .h1 { font-size:28px; font-weight:900; margin:0 0 8px; color:#ffffff; letter-spacing: .2px; }
      .muted { color:#cbd5e1; font-size:15px; margin:4px 0 0; }
      .table { width:100%; border-collapse: collapse; margin-top: 16px; color:#e5e7eb; }
      .table th, .table td { padding: 14px 12px; border-bottom: 1px solid rgba(148,163,184,0.18); font-size:15px; }
      .table th { text-align:left; color:#ffffff; font-weight:800; }
      .right { text-align:right; }
      .total { font-weight:900; color:#ffb200; font-size:18px; }
      .badge { display:inline-block; padding:8px 14px; border:1px solid rgba(148,163,184,0.35); border-radius:999px; font-size:12px; color:#e5e7eb; }
      .footer { margin-top: 20px; color:#cbd5e1; font-size:12px; }
      .code-safe { color:#e5e7eb; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
          <div>
            <div class="h1">New Service Package Request</div>
            <div class="muted">Request from <strong>{{NAME}}</strong> — Phone: <strong>{{PHONE}}</strong> — Email: <strong>{{EMAIL}}</strong></div>
          </div>
          <div class="badge">Service Builder</div>
        </div>

        <table class="table" role="presentation" cellspacing="0" cellpadding="0">
          <thead>
            <tr>
              <th>Service</th>
              <th class="right">Price</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="2" style="padding-top:6px;">
                <div style="white-space:pre-line; color:#e5e7eb;">{{ITEM_TEXT}}</div>
              </td>
            </tr>
            <tr>
              <td class="total">Total</td>
              <td class="total right">{{QUOTE_TOTAL}}</td>
            </tr>
          </tbody>
        </table>

        <div style="margin-top:16px;">
          <div style="font-weight:800; color:#ffffff; margin-bottom:6px;">Notes</div>
          <div style="color:#e5e7eb; white-space:pre-wrap;">{{NOTES}}</div>
        </div>

        <div class="footer">This request was generated automatically by the Service Package Builder.</div>
      </div>
    </div>
  </body>
  </html>
