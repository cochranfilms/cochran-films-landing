<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Test - Cochran Films</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/services.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/portfolio.css">
    <link rel="stylesheet" href="css/service-builder.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <!-- AI Background Canvas -->
    <canvas id="neuralCanvas"></canvas>
    
    <!-- Test Navigation -->
    <div id="navigation-module">
        <nav class="nav-wrapper">
            <div class="nav-container">
                <a href="#" class="nav-logo">
                    <img src="CF_Logo_White2025.png" alt="Cochran Films">
                </a>
                <ul class="nav-menu">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#services">Services</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- Test Hero -->
    <div id="hero-module">
        <section class="hero">
            <h1>TEST PAGE - Modular System Working</h1>
            <p>If you can see this styled properly, the modular system is working!</p>
        </section>
    </div>

    <!-- Test Portfolio -->
    <div id="portfolio-module">
        <section class="portfolio-section">
            <h2>Portfolio Test</h2>
            <div class="portfolio-grid">
                <!-- Portfolio items will be loaded here -->
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="js/core.js"></script>
    <script src="js/ai-background.js"></script>
    <script src="js/portfolio.js"></script>
    <script src="js/service-builder.js"></script>
    
    <script>
        // Simple test initialization
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Test page loaded');
            
            // Initialize AI background
            if (window.AINeuralBackground) {
                new window.AINeuralBackground();
            }
            
            // Initialize portfolio
            if (window.PortfolioManager) {
                new window.PortfolioManager();
            }
            
            // Initialize core
            if (window.CochranFilmsCore) {
                new window.CochranFilmsCore();
            }
        });
    </script>
</body>
</html>
