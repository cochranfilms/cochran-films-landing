name: Daily Blog Generator

on:
  schedule:
    - cron: '0 * * * *' # Run hourly; generator enforces 12:00 America/New_York via env guard
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate blog posts
        env:
          ENFORCE_LOCAL_NOON: 'true'
          TIMEZONE: 'America/New_York'
        run: npm run generate:blog

      - name: Commit and push SEO pages
        run: |
          git add blog/posts.json blog/post/*.html
          if git diff --staged --quiet; then
            echo "No SEO page changes"
          else
            git commit -m "chore(blog): update posts and SEO pages [skip ci]"
            git push
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/posts.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(blog): update daily posts [skip ci]"
            git push
          fi


