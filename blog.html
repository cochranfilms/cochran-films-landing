<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cochran Films — Blog</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/responsive.css">

  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <!-- AI Neural Network Background -->
  <div class="ai-background">
    <canvas id="neuralCanvas"></canvas>
  </div>
  <!-- Navigation Module -->
  <div id="navigation-module"></div>

  <main class="wrapper" style="padding-top: 100px; padding-bottom: 80px;">
    <section>
      <section id="ai-blog-banner" style="margin-bottom:16px; border:1px solid rgba(99,102,241,0.25); background: linear-gradient(135deg, rgba(15,23,42,0.8), rgba(2,6,23,0.9)); border-radius:16px; padding:16px 18px; color:#e5e7eb">
        <div style="display:flex;gap:14px;align-items:flex-start;">
          <div style="width:42px;height:42px;border-radius:10px;background:rgba(255,178,0,0.15);display:grid;place-items:center;color:#FFB200"><i class="fas fa-wand-magic-sparkles"></i></div>
          <div>
            <h1 style="margin:0 0 6px 0; font-size:22px; font-weight:900; background: linear-gradient(135deg, #fff, #dbeafe); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Cochran Films Daily Brief</h1>
            <p style="margin:0; color:#cbd5e1;">Fresh, curated reads on web design, filmmaking, video creation, and brand development. New posts daily.</p>
            <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
              <a href="/index2.html#home" class="nav-link" style="padding:8px 12px;border-radius:999px;background:rgba(255,178,0,0.15);border:1px solid rgba(255,178,0,0.35);color:#fef3c7;text-decoration:none;font-weight:800">Home</a>
            </div>
          </div>
        </div>
      </section>

      <div id="blog-posts" aria-live="polite"></div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/modules.js"></script>
  <script>
    // Ensure navigation module loads
    window.__MODULES_BASE_PATH__ = '';
  </script>
  <script src="js/blog.js"></script>
  <script>
    // AI NEURAL NETWORK BACKGROUND (parity with index2.html)
    (function(){
      class AINeuralNetwork {
        constructor(){
          this.canvas = document.getElementById('neuralCanvas');
          if(!this.canvas) return;
          this.ctx = this.canvas.getContext('2d');
          this.particles = [];
          this.connections = [];
          this.mouse = { x: 0, y: 0 };
          this.animationId = null;
          this.init();
        }
        init(){ this.resize(); this.createParticles(); this.createConnections(); this.bind(); this.animate(); }
        resize(){ this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
        createParticles(){
          this.particles = [];
          const count = 100;
          for(let i=0;i<count;i++){
            this.particles.push({
              x: Math.random()*this.canvas.width,
              y: Math.random()*this.canvas.height,
              vx: (Math.random()-0.5)*0.3,
              vy: (Math.random()-0.5)*0.3,
              size: Math.random()*2+1,
              color: this.color(),
              pulse: Math.random()*Math.PI*2
            });
          }
        }
        createConnections(){
          this.connections = [];
          const d = 120;
          for(let i=0;i<this.particles.length;i++){
            for(let j=i+1;j<this.particles.length;j++){
              const dx = this.particles[i].x - this.particles[j].x;
              const dy = this.particles[i].y - this.particles[j].y;
              const dist = Math.sqrt(dx*dx+dy*dy);
              if(dist < d){ this.connections.push({ from:i, to:j, strength:1-(dist/d), pulse:Math.random()*Math.PI*2 }); }
            }
          }
        }
        color(){
          const c = [
            'rgba(6, 182, 212, 0.6)',
            'rgba(20, 184, 166, 0.6)',
            'rgba(124, 58, 237, 0.6)',
            'rgba(99, 102, 241, 0.6)',
            'rgba(255, 178, 0, 0.6)'
          ];
          return c[Math.floor(Math.random()*c.length)];
        }
        bind(){
          window.addEventListener('resize', ()=>this.resize());
          document.addEventListener('mousemove', e=>{ this.mouse.x=e.clientX; this.mouse.y=e.clientY; });
        }
        update(){
          this.particles.forEach(p=>{
            p.x += p.vx; p.y += p.vy;
            if(p.x<=0||p.x>=this.canvas.width) p.vx*=-1;
            if(p.y<=0||p.y>=this.canvas.height) p.vy*=-1;
            p.pulse += 0.02;
            const dx = this.mouse.x - p.x, dy = this.mouse.y - p.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if(dist < 150){ const a = Math.atan2(dy, dx), f = (150-dist)/150; p.vx += Math.cos(a)*f*0.01; p.vy += Math.sin(a)*f*0.01; }
            p.vx *= 0.99; p.vy *= 0.99;
          });
        }
        draw(){
          this.ctx.fillStyle = 'rgba(2, 6, 23, 0.1)';
          this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
          this.connections.forEach(c=>{
            const a = this.particles[c.from], b = this.particles[c.to];
            if(!a||!b) return; const alpha = 0.3 + Math.sin(c.pulse)*0.2;
            this.ctx.strokeStyle = `rgba(99, 102, 241, ${alpha * c.strength})`;
            this.ctx.lineWidth = 1*c.strength; this.ctx.beginPath(); this.ctx.moveTo(a.x,a.y); this.ctx.lineTo(b.x,b.y); this.ctx.stroke(); c.pulse += 0.01;
          });
          this.particles.forEach(p=>{ const alpha = 0.6 + Math.sin(p.pulse)*0.4; this.ctx.fillStyle = p.color.replace('0.6)', `${alpha})`); this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill(); });
        }
        animate(){ this.update(); this.draw(); this.animationId = requestAnimationFrame(()=>this.animate()); }
      }
      if(document.readyState==='loading'){
        document.addEventListener('DOMContentLoaded', ()=> new AINeuralNetwork());
      } else { new AINeuralNetwork(); }
    })();
  </script>
</body>
<style>
  /* Lightweight styles scoped to the blog page */
  .ai-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
  #neuralCanvas { width: 100%; height: 100%; display: block; }
  #blog-posts { display: grid; gap: 16px; }
  .blog-card {
    border: 1px solid var(--border-color, #222);
    border-radius: 12px;
    padding: 16px;
    background: rgba(255,255,255,0.02);
  }
  .blog-card h2 { margin: 0 0 8px 0; font-size: 1.125rem; }
  .blog-card .meta { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; }
  .blog-card a.read-more { color: var(--brand-gold, #e3c565); font-weight: 600; }
  @media (min-width: 768px) {
    #blog-posts { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 1080px) {
    #blog-posts { grid-template-columns: repeat(3, 1fr); }
  }
  /* Mobile tweak for AI banner and grid */
  @media (max-width: 767px) {
    #ai-blog-banner {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    #ai-blog-banner .nav-link {
      width: 100%;
      text-align: center;
    }
  }
</style>
</html>
