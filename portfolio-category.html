<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cochran Films | Portfolio Category</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Playfair+Display:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/portfolio.css">
  <style>
    :root {
      --cosmic-purple: #1a0b2e;
      --deep-space: #16213e;
      --electric-blue: #0f3460;
      --neon-cyan: #00d4ff;
      --aurora-green: #00ff88;
      --plasma-pink: #ff006e;
      --solar-gold: #ffbe0b;
      --nebula-violet: #8338ec;
    }

    body { 
      background: var(--cosmic-purple);
      color: #fff;
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
    }

    /* Enhanced Hero Section */
    .category-hero { 
      padding: 120px 20px 60px;
      text-align: center;
      background: linear-gradient(135deg, 
        rgba(26,11,46,.95), 
        rgba(15,52,96,.95)
      );
      position: relative;
      overflow: hidden;
    }

    .category-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(0,212,255,0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(131,56,236,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .category-hero h1 { 
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff, rgba(255,255,255,0.8));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
    }

    .category-hero h1 i {
      font-size: 0.8em;
      margin-right: 15px;
      vertical-align: middle;
      color: var(--neon-cyan);
      -webkit-text-fill-color: var(--neon-cyan);
      background-clip: text;
    }

    .category-hero p { 
      color: #cbd5e1;
      max-width: 800px;
      margin: 0 auto;
      font-size: 1.2rem;
      line-height: 1.8;
    }

    .container { 
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 40px;
    }

    /* Enhanced Portfolio Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 40px;
      padding: 40px 0;
    }

    .portfolio-item {
      position: relative;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16/9;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .portfolio-item:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: var(--neon-cyan);
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.3),
        0 0 80px rgba(0,212,255,0.2);
    }

    .portfolio-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .portfolio-item:hover img {
      transform: scale(1.1);
    }

    .portfolio-item-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px;
      background: linear-gradient(
        transparent,
        rgba(15,23,42,0.8) 20%,
        rgba(15,23,42,0.95)
      );
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .portfolio-item:hover .portfolio-item-content {
      transform: translateY(0);
    }

    .portfolio-item-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      font-family: 'Playfair Display', serif;
    }

    .portfolio-item-description {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.9);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .portfolio-item-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .portfolio-item-category {
      font-size: 0.95rem;
      color: var(--neon-cyan);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .portfolio-item-date {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
    }

    /* Enhanced CTA Button */
    .portfolio-item-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 30px;
      color: white;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    .portfolio-item-cta:hover {
      background: rgba(255,255,255,0.2);
      border-color: var(--neon-cyan);
      transform: translateY(-2px);
    }

    .portfolio-item-cta i {
      font-size: 1.1em;
    }

    /* Loading State */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: var(--neon-cyan);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-state p {
      color: rgba(255,255,255,0.8);
      font-size: 1.2rem;
    }

    /* No Items State */
    .no-items {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      font-size: 1.2rem;
      color: rgba(255,255,255,0.8);
    }

    /* Responsive Design */
    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 30px;
      }
      .category-hero h1 { font-size: 3rem; }
    }

    @media (max-width: 768px) {
      .container { padding: 0 20px; }
      .grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .category-hero {
        padding: 100px 20px 40px;
      }
      .category-hero h1 { font-size: 2.5rem; }
      .category-hero p { font-size: 1.1rem; }
      .portfolio-item-content { padding: 24px; }
      .portfolio-item-title { font-size: 1.5rem; }
    }

    /* Fix logo size */
    .nav-logo img { 
      max-height: 45px;
      width: auto;
    }
  </style>
</head>
<body>
  <nav class="nav-wrapper" role="navigation" aria-label="Main navigation">
    <div class="nav-container">
      <a href="/home.html" class="nav-logo"><img src="CF_Logo_White2025.png" alt="Cochran Films logo" /></a>
      <ul class="nav-menu">
        <li class="nav-item"><a href="/home.html" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="/portfolio.html" class="nav-link">Portfolio</a></li>
        <li class="nav-item"><a href="/services.html" class="nav-link">Services</a></li>
        <li class="nav-item"><a href="/contact.html" class="nav-link">Contact</a></li>

  </nav>

  <header class="category-hero">
    <h1 id="categoryTitle">Portfolio</h1>
    <p id="categoryDesc">Explore the full collection of our work in this category.</p>
  </header>

  <main class="container">
    <div id="categoryGrid" class="grid"></div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo"><img src="CF_Logo_White2025.png" alt="Cochran Films logo" /></div>
      <div class="footer-copyright">© 2025 Cochran Films LLC. All rights reserved.</div>
    </div>
  </footer>

  <script>
    window.API_BASE_URL = window.location.origin;

    // Comprehensive fallback data for all categories
    window.FALLBACK_PORTFOLIO_DATA = {
      'Video Production': [
        {
          Title: "Evolve Contracting - National Small Business Week",
          Description: "DP | Gaffer | Editor | Audio. Shot on Sony FX6: 24-70mm f/2.8",
          Category: "Corporate",
          'Thumbnail Image': "https://static.wixstatic.com/media/aeef42_7a5a1e21bcb349369b5cfce51e197341~mv2.jpg",
          playbackUrl: "https://video.wixstatic.com/video/aeef42_55d75649953a40d4963f44cb2322046f/1080p/mp4/file.mp4",
          UploadDate: "2025-01-24"
        }
      ],
      'Web Development': [
        {
          Title: "Course Creator Academy",
          Description: "Full-stack e-learning platform with dynamic content management",
          Category: "E-Commerce",
          'Thumbnail Image': "CMS/Thumbnails/Web Development/CCA_Live_Website.png",
          URL: "https://coursecreatoracademy.org",
          'Tech Stack': "Shopify, Liquid, HTML5, CSS3, JavaScript",
          Role: "Full-Stack Developer",
          Timeline: "4 weeks"
        }
      ],
      'Photography': [
        {
          Title: "Corporate Event Photography",
          Description: "Professional event coverage with editorial style",
          Category: "Events",
          'image_url': "CMS/Photos/DSC05613-Enhanced-NR.jpg"
        }
      ],
      'Brand Development': [
        {
          Title: "Ceven Skin® Brand Identity",
          Description: "Complete brand identity system for skincare line",
          'Client/Brand Name': "Ceven Skin®",
          'Services Provided': "Logo Design, Brand Guidelines, Packaging",
          'Project URL (optional)': "https://www.cochranfilms.com/brand/ceven-skin",
          'Thumbnail / Cover Image URL': "https://static.wixstatic.com/media/your-image-url.jpg",
          Industry: "Skincare / Beauty"
        }
      ]
    };
  </script>
  <script src="js/airtable-cms.js?v=20250823b"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const category = params.get('category') || 'Portfolio';
      const titleEl = document.getElementById('categoryTitle');
      const descEl = document.getElementById('categoryDesc');
      const gridEl = document.getElementById('categoryGrid');
      
      // Enhanced category descriptions
      const categoryInfo = {
        'Video Production': {
          title: 'Video Production Portfolio',
          description: 'Cinematic storytelling across corporate, events, and branded content. From concept to final delivery, we create compelling visual narratives that engage and inspire.',
          icon: 'video'
        },
        'Web Development': {
          title: 'Web Development Projects',
          description: 'High-performance websites and applications engineered for results. Modern, responsive, and optimized for conversion.',
          icon: 'code'
        },
        'Photography': {
          title: 'Photography Collection',
          description: 'Professional photography that captures the essence of your brand, products, and events with artistic vision and technical excellence.',
          icon: 'camera'
        },
        'Brand Development': {
          title: 'Brand Development Portfolio',
          description: 'Strategic brand development from concept to execution. Creating memorable brand identities that resonate with your audience.',
          icon: 'palette'
        }
      };

      // Set category info
      const info = categoryInfo[category] || {
        title: category,
        description: 'Explore the full collection of our work in this category.',
        icon: 'star'
      };
      
      titleEl.innerHTML = `<i class="fas fa-${info.icon}"></i> ${info.title}`;
      descEl.textContent = info.description;

      // Show loading state
      gridEl.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading portfolio items...</p></div>';

      // Enhanced rendering function with fallback
      async function renderPortfolio() {
        try {
          if (window.airtableCMS && typeof window.airtableCMS.renderCategoryPage === 'function') {
            await window.airtableCMS.renderCategoryPage(category, 'categoryGrid');
          } else {
            throw new Error('Airtable CMS not available');
          }
        } catch (error) {
          console.warn('⚠️ Using fallback data:', error);
          renderFallbackData(category);
        }
      }

      // Render fallback data
      function renderFallbackData(category) {
        const items = window.FALLBACK_PORTFOLIO_DATA[category] || [];
        if (items.length === 0) {
          gridEl.innerHTML = '<div class="no-items">No items found in this category</div>';
          return;
        }

        gridEl.innerHTML = items.map(item => `
          <div class="portfolio-item" data-category="${item.Category || ''}">
            <img src="${item['Thumbnail Image'] || item.image_url || item['Logo URL']}" 
                 alt="${item.Title}" loading="lazy">
            <div class="portfolio-item-content">
              <h3 class="portfolio-item-title">${item.Title}</h3>
              <p class="portfolio-item-description">${item.Description || ''}</p>
              <div class="portfolio-item-meta">
                <span class="portfolio-item-category">${item.Category || item['Client/Brand Name'] || ''}</span>
                <span class="portfolio-item-date">${item.UploadDate || item.Timeline || ''}</span>
              </div>
              ${getItemCTA(item, category)}
            </div>
          </div>
        `).join('');

        // Add click handlers
        document.querySelectorAll('.portfolio-item').forEach(item => {
          item.addEventListener('click', (e) => {
            if (e.target.closest('.portfolio-item-cta')) return; // Don't trigger if clicking CTA
            const data = window.FALLBACK_PORTFOLIO_DATA[category].find(
              d => d.Title === item.querySelector('.portfolio-item-title').textContent
            );
            handleItemClick(data, category);
          });
        });
      }

      // Get appropriate CTA based on item type
      function getItemCTA(item, category) {
        switch(category) {
          case 'Video Production':
            return `<button class="portfolio-item-cta" onclick="openVideoModal('${item.playbackUrl}')">
                     <i class="fas fa-play"></i> Play Video
                   </button>`;
          case 'Web Development':
            return `<a href="${item.URL}" target="_blank" class="portfolio-item-cta">
                     <i class="fas fa-external-link-alt"></i> Visit Site
                   </a>`;
          case 'Photography':
            return `<button class="portfolio-item-cta" onclick="openImageModal('${item.image_url}', '${item.Title}')">
                     <i class="fas fa-search-plus"></i> View Full Size
                   </button>`;
          case 'Brand Development':
            return `<a href="${item['Project URL (optional)']}" target="_blank" class="portfolio-item-cta">
                     <i class="fas fa-eye"></i> View Project
                   </a>`;
          default:
            return '';
        }
      }

      // Handle item clicks
      function handleItemClick(item, category) {
        switch(category) {
          case 'Video Production':
            if (item.playbackUrl) openVideoModal(item.playbackUrl);
            break;
          case 'Web Development':
            if (item.URL) window.open(item.URL, '_blank');
            break;
          case 'Photography':
            if (item.image_url) openImageModal(item.image_url, item.Title);
            break;
          case 'Brand Development':
            if (item['Project URL (optional)']) window.open(item['Project URL (optional)'], '_blank');
            break;
        }
      }

      // Initialize
      renderPortfolio();
    })();
  </script>
</body>
</html>
